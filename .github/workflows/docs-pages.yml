name: Publish Versioned Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docs-pages.yml"
      - "info/**"
      - "docs/**"
      - "node/**"
      - "thornforge/buildsite/**"
      - "README.rst"
      - "CHANGELOG.rst"
      - "pyproject.toml"
      - "requirements.txt"
      - "MANIFEST.in"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from for manual runs"
        required: false
        type: string
      thornforge-ref:
        description: "The Git ref of the ThornForge repo to use"
        required: false
        type: string
        default: main
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build from"
        required: false
        type: string
      thornforge-ref:
        description: "The Git ref of the ThornForge repo to use"
        required: false
        type: string
        default: main

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  resolve-info:
    uses: Officer-Erik-1K-88/ThornForge/.github/workflows/info.yml@main
    with:
      ref: ${{ inputs.ref }}
      thornforge-ref: ${{ inputs.thornforge-ref }}

  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    needs: resolve-info
    permissions:
      contents: read
    steps:
      # This checks out the repo that CALLED the workflow.
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.resolve-info.outputs.project-ref }}
          path: project

      # This checks out ThornForge itself.
      - name: Checkout ThornForge
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.resolve-info.outputs.thornforge-repository }}
          ref: ${{ needs.resolve-info.outputs.thornforge-ref }}
          path: thornforge

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: thornforge/node/package-lock.json

      - name: Install ThornForge
        working-directory: thornforge
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install docs UI test dependencies
        working-directory: thornforge/node
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build GitHub Pages Site
        working-directory: project
        run: thornforge buildsite --source . --output site

      - name: Verify docs UI
        working-directory: thornforge/node
        run: npm run test:docs-ui
        env:
          SITE_DIR: ../../project/site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: project/site

  deploy:
    name: Deploy Docs Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
