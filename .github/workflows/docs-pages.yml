name: Publish Versioned Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docs-pages.yml"
      - "info/**"
      - "docs/**"
      - "node/**"
      - "thornforge/buildsite/**"
      - "README.rst"
      - "CHANGELOG.rst"
      - "pyproject.toml"
      - "requirements.txt"
      - "MANIFEST.in"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from for manual runs"
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Docs Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref != '' && inputs.ref || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: node/package-lock.json

      - name: Install ThornForge
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Install docs UI test dependencies
        working-directory: node
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build versioned docs
        run: thornforge buildsite --source . --output site

      - name: Verify docs UI
        working-directory: node
        run: npm run test:docs-ui

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy Docs Site
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
