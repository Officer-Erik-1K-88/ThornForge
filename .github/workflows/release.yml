name: Release on GitHub

on:
  workflow_call:
    inputs:
      name:
        description: "The name to give the release."
        required: false
        type: string
      ref:
        description: "Git ref to build from for manual runs."
        required: false
        type: string
      draft:
        description: "Keep the release as a draft."
        default: false
        required: false
        type: boolean
      prerelease:
        description: "Indicator of whether or not the release is a prerelease."
        default: false
        required: false
        type: boolean

jobs:
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    environment: github-releases
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ case(inputs.name != '', inputs.name, inputs.ref != '' && inputs.ref != github.ref, inputs.ref, github.ref_name) }}
          tag_name: ${{ case(inputs.ref != '' && inputs.ref != github.ref, inputs.ref, github.ref_name) }}
          draft: inputs.draft
          prerelease: inputs.prerelease
          generate_release_notes: true
          files: dist/*
